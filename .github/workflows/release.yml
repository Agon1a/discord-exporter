name: Automated Release & Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:all
        continue-on-error: false

      - name: Run linter
        run: npm run lint:check
        continue-on-error: false

      - name: Build verification
        run: |
          test -f manifest.json
          test -f public/popup.html
          test -f public/styles.css
          test -f src/lib/shared-utils.js
          test -f src/lib/content-utils.js
          test -f src/content.js

  release:
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract_version.outputs.version }}
      changelog: ${{ steps.extract_changelog.outputs.content }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: extract_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=v$VERSION" >> $GITHUB_OUTPUT

      - name: Extract changelog for this version
        id: extract_changelog
        run: |
          VERSION=${{ steps.extract_version.outputs.version }}

          if [ -f CHANGELOG.md ]; then
            CHANGELOG=$(sed -n "/## \[${VERSION}\]/,/## \[/p" CHANGELOG.md | sed '$d')
          fi

          if [ -z "${CHANGELOG:-}" ]; then
            CHANGELOG="Release v${VERSION}"
          fi

          CHANGELOG="${CHANGELOG//$'\n'/'%0A'}"
          echo "content=$CHANGELOG" >> $GITHUB_OUTPUT

      - name: Build browser extension package
        run: |
          VERSION=${{ steps.extract_version.outputs.version }}
          DIST="dist/discord-exporter-v${VERSION}"
          mkdir -p "$DIST/public/icons" "$DIST/src/lib/exporters"

          cp manifest.json "$DIST/"
          cp public/popup.html "$DIST/public/"
          cp public/styles.css "$DIST/public/"
          cp public/icons/icon16.png "$DIST/public/icons/"
          cp public/icons/icon48.png "$DIST/public/icons/"
          cp public/icons/icon128.png "$DIST/public/icons/"
          cp src/content.js "$DIST/src/"
          cp src/popup.js "$DIST/src/"
          cp src/lib/shared-utils.js "$DIST/src/lib/"
          cp src/lib/content-utils.js "$DIST/src/lib/"
          cp src/lib/i18n.js "$DIST/src/lib/"
          cp src/lib/error-handler.js "$DIST/src/lib/"
          cp src/lib/filters.js "$DIST/src/lib/"
          cp src/lib/popup-utils.js "$DIST/src/lib/"
          cp src/lib/exporters/csv-exporter.js "$DIST/src/lib/exporters/"
          cp src/lib/exporters/json-exporter.js "$DIST/src/lib/exporters/"
          cp src/lib/exporters/markdown-exporter.js "$DIST/src/lib/exporters/"

          (cd "$DIST" && zip -r "../discord-exporter-v${VERSION}.zip" .)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.extract_version.outputs.tag_name }}
          name: Discord Exporter v${{ steps.extract_version.outputs.version }}
          body: ${{ steps.extract_changelog.outputs.content }}
          files: dist/discord-exporter-v${{ steps.extract_version.outputs.version }}.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log Release Creation
        run: |
          echo "✓ Release v${{ steps.extract_version.outputs.version }} created successfully"
          echo "See: https://github.com/${{ github.repository }}/releases/tag/${{ steps.extract_version.outputs.tag_name }}"

  # Optional: Publish to Chrome Web Store
  # Uncomment when ready and configure CWS secrets
  publish-cws:
    needs: release
    runs-on: ubuntu-latest
    if: false  # Set to true when ready to auto-publish to Chrome Web Store
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Prepare extension package
        run: |
          mkdir -p dist
          mkdir -p dist/public/icons dist/src/lib/exporters
          cp manifest.json dist/
          cp public/popup.html dist/public/
          cp public/styles.css dist/public/
          cp public/icons/icon16.png dist/public/icons/
          cp public/icons/icon48.png dist/public/icons/
          cp public/icons/icon128.png dist/public/icons/
          cp src/content.js dist/src/
          cp src/popup.js dist/src/
          cp src/lib/shared-utils.js dist/src/lib/
          cp src/lib/content-utils.js dist/src/lib/
          cp src/lib/i18n.js dist/src/lib/
          cp src/lib/error-handler.js dist/src/lib/
          cp src/lib/filters.js dist/src/lib/
          cp src/lib/popup-utils.js dist/src/lib/
          cp src/lib/exporters/csv-exporter.js dist/src/lib/exporters/
          cp src/lib/exporters/json-exporter.js dist/src/lib/exporters/
          cp src/lib/exporters/markdown-exporter.js dist/src/lib/exporters/
          cd dist && zip -r ../discord-exporter-${{ needs.release.outputs.version }}.zip .

      - name: Upload to Chrome Web Store
        uses: mnao305/chrome-extension-upload@v4
        with:
          file-path: discord-exporter-${{ needs.release.outputs.version }}.zip
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}

  notify:
    needs: release
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Prepare notification
        id: message
        run: |
          STATUS="✓ SUCCESS"
          if [ "${{ needs.release.result }}" = "failure" ]; then
            STATUS="✗ FAILED"
          fi
          
          echo "message=$STATUS - Release v${{ needs.release.outputs.version }} created" >> $GITHUB_OUTPUT
          echo "url=https://github.com/${{ github.repository }}/releases/tag/v${{ needs.release.outputs.version }}" >> $GITHUB_OUTPUT

      - name: Log completion
        run: |
          echo "Release Workflow Complete"
          echo "Status: ${{ steps.message.outputs.message }}"
          echo "Link: ${{ steps.message.outputs.url }}"
